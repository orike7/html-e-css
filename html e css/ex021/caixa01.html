<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Caixas</title>
    <link rel="stylesheet" href="style.css">
    <style>
        h1 {
            height: 300px;
            width: 300px;
            background-color: lightgray;
            border-style: solid;
            border-color: red;
            text-align: center;

        }

        p {
            border-width: 10px;
            border-style: solid;
            border-color: red;
            text-align: center;
            margin: auto;
        }
    </style>

</head>
<body>
    <h1>Exemplo de caixa box-level</h1>
    <p>Parágragos também são exemplos de box-level, mas os <a href="#">links são exemplos de caixas inline-level</a>. Vamos ver como tudo isso funciona</p>

</body>
</html>
